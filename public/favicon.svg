<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Solid dark background for crisp tab rendering -->
  <rect width="64" height="64" rx="10" fill="#0E1020" />
  <!-- Outer thin frame -->
  <rect x="9" y="9" width="46" height="46" rx="1" stroke="#6B6DEC" stroke-width="2" />
  <!-- Inner solid square -->
  <rect x="18" y="18" width="28" height="28" fill="#6B6DEC" />
  <!-- "T" letter -->
  <rect x="21" y="22" width="22" height="4" fill="#FFFFFF" />
  <rect x="29" y="22" width="6" height="18" fill="#FFFFFF" />
</svg>
